# [ops.win-repeat-mount] - repeat dismount+remount {step.count} times
# [ops.win-write]        - write fixture files to the mounted volume
#
# The `qemu-img` VHDX wrap currently used by run-scenario.ps1 is the
# Phase 1e replacement target (swap to am-img-vhd::create_fixed once
# its CLI is wired into the consumer surface).
