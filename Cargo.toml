[package]
name = "fs-ntfs"
version = "0.1.2"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Pure-Rust NTFS filesystem driver. Exposes a C ABI (fs_ntfs_*) suitable for FFI from C/C++/Go/etc."
repository = "https://github.com/christhomas/rust-fs-ntfs"
readme = "README.md"

[lib]
name = "fs_ntfs"
crate-type = ["staticlib", "rlib"]

# Standalone CLI tool. Cross-platform — builds + runs identically on
# Linux/macOS/Windows because it only depends on this crate's own
# pure-Rust format path. Distributed via Homebrew tap on macOS and
# `cargo install` everywhere; the DiskJockey app does NOT bundle this
# binary (App Store rules forbid bundling CLI tools), it routes through
# FSKit's startFormat which calls the same format_filesystem() entry.
#
# Binary name uses underscore — Cargo's bin name field doesn't accept
# dots. The Homebrew formula symlinks /usr/local/bin/mkfs.ntfs ->
# mkfs_ntfs at install time so the user-visible command matches the
# standard mkfs.ntfs CLI naming convention.
[[bin]]
name = "mkfs_ntfs"
path = "src/bin/mkfs_ntfs.rs"

[dependencies]
ntfs = { version = "0.4", default-features = false, features = ["std"] }

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
panic = "unwind"

[profile.dev]
opt-level = 1
panic = "unwind"
