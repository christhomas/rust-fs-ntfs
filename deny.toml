# cargo-deny — license + supply-chain policy.
#
# Pairs with the project-wide "no GPL/LGPL/AGPL" rule. Run locally
# with `cargo deny check` once cargo-deny is installed; CI runs it
# automatically (see .github/workflows/ci.yml).

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
# version = 2 opts into cargo-deny's current schema (PR #611). Pre-v2
# keys like `vulnerability`, `unmaintained`, `unsound`, `notice`,
# `severity-threshold` were removed in 0.18; their behaviours are now
# always-on.
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
# version = 2 — same migration as [advisories]. The pre-v2
# `unlicensed`, `allow-osi-fsf-free`, `copyleft`, `default`, and
# `deny` keys were removed; the allow-list below is now the sole
# source of truth (anything not listed is denied).
version = 2
# Permissive licenses we accept. Anything outside this list fails the
# check; explicit allowlist forces a deliberate choice for new
# additions rather than silent inheritance.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "0BSD",
]
confidence-threshold = 0.93
exceptions = []

[bans]
# Catch accidental introduction of GPL'd ecosystem deps by name as a
# second line of defence beyond [licenses]. Any new entry here should
# also have a [licenses].deny matching its actual SPDX expression.
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
allow = []
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
